<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Queue System</title>
  <link rel="stylesheet" href="smart-queue.css" />
  <link rel="icon" href="/images/favicon.png">
  
</head>
<body>

  <main class="page">
    <section class="booking-wrapper">
        <a href="/index.html" class="back-home">← Back to Home</a>
      <div class="booking-card">
        <div class="booking-header">
          <span class="badge">AWS Serverless Demo</span>
          <h1>Smart Queue System</h1>
          <p class="subtitle">
            Book your appointment in seconds with a simple serverless booking experience.
          </p>
        </div>

        <form id="bookingForm" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="customerName">Full Name</label>
              <input type="text" id="customerName" placeholder="Enter your full name" maxlength="50" required />
            </div>

            <div class="form-group">
              <label for="customerEmail">Email Address</label>
              <input type="email" id="customerEmail" placeholder="Enter your email" maxlength="50" required />
            </div>

            <div class="form-group">
              <label for="serviceType">Service</label>
              <select id="serviceType" required>
                <option value="">Select a service</option>
                <option value="Consultation">Consultation</option>
                <option value="Haircut">Haircut</option>
                <option value="Repair">Repair</option>
                <option value="Coaching Session">Coaching Session</option>
              </select>
            </div>

            <div class="form-group">
              <label for="appointmentDate">Appointment Date</label>
              <input type="date" id="appointmentDate" required />
            </div>

            <div class="form-group">
              <label for="appointmentTime">Appointment Time</label>
              <input type="time" id="appointmentTime" required />
            </div>
          </div>

          <button type="submit" id="submitButton">Book Appointment</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="smart-queue.js"></script>
</body>
</html>
